name: CD — Deploy to Railway

on:
  push:
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # Job 0: Ensure infrastructure exists via Terraform
  # Idempotent — si los servicios ya existen, 0 cambios
  # Si fueron borrados accidentalmente, los recrea
  # ──────────────────────────────────────────────
  ensure-infrastructure:
    name: Ensure Infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

  # ──────────────────────────────────────────────
  # Job 1: Build Docker image once, push to GHCR
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/twenty-docker/twenty/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REACT_APP_SERVER_BASE_URL=${{ vars.SERVICE_URL }}

  # ──────────────────────────────────────────────
  # Job 2: Deploy API and Worker in parallel
  # Both services pull the same image from GHCR
  # ──────────────────────────────────────────────
  deploy-api:
    name: Deploy API Service
    runs-on: ubuntu-latest
    needs: [ensure-infrastructure, build-and-push]
    steps:
      - name: Trigger API redeploy via Railway API
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            --request POST \
            --header "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data '{"query":"mutation { serviceInstanceRedeploy(environmentId: \"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\", serviceId: \"${{ secrets.RAILWAY_API_SERVICE_ID }}\") }"}' \
            https://backboard.railway.app/graphql/v2)
          echo "Railway API response: HTTP $RESPONSE"
          [ "$RESPONSE" = "200" ] || exit 1

  deploy-worker:
    name: Deploy Worker Service
    runs-on: ubuntu-latest
    needs: [ensure-infrastructure, build-and-push]
    steps:
      - name: Trigger Worker redeploy via Railway API
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            --request POST \
            --header "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data '{"query":"mutation { serviceInstanceRedeploy(environmentId: \"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\", serviceId: \"${{ secrets.RAILWAY_WORKER_SERVICE_ID }}\") }"}' \
            https://backboard.railway.app/graphql/v2)
          echo "Railway API response: HTTP $RESPONSE"
          [ "$RESPONSE" = "200" ] || exit 1

  # ──────────────────────────────────────────────
  # Job 3: Verify deployment health
  # ──────────────────────────────────────────────
  verify:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-worker]
    steps:
      - name: Wait for deployment and verify health
        run: |
          echo "Waiting for Railway deployment to be ready..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ vars.SERVICE_URL }}/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS) after $((i * 10)) seconds"
              exit 0
            fi
            echo "Attempt $i/30: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 minutes"
          exit 1
