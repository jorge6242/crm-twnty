name: CD — Deploy to Railway

on:
  push:
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # Job 0: Ensure infrastructure exists via Terraform
  # Passes current service IDs as outputs — always up to date
  # ──────────────────────────────────────────────
  ensure-infrastructure:
    name: Ensure Infrastructure
    runs-on: ubuntu-latest
    outputs:
      api_service_id: ${{ steps.tf-output.outputs.api_service_id }}
      worker_service_id: ${{ steps.tf-output.outputs.worker_service_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Repair stale state
        working-directory: terraform
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          check_service() {
            local result=$(curl -s \
              --request POST \
              --header "Authorization: Bearer $RAILWAY_TOKEN" \
              --header "Content-Type: application/json" \
              --data "{\"query\":\"{ service(id: \\\"$1\\\") { id } }\"}" \
              https://backboard.railway.app/graphql/v2)
            echo "$result" | grep -q '"errors"' && return 1 || return 0
          }

          API_ID=$(terraform output -raw api_service_id 2>/dev/null || echo "")
          WORKER_ID=$(terraform output -raw worker_service_id 2>/dev/null || echo "")

          if [ -n "$API_ID" ] && ! check_service "$API_ID"; then
            echo "CRM API service not found in Railway — removing from state"
            terraform state rm railway_service.crm_api 2>/dev/null || true
            terraform state rm railway_variable_collection.crm_api_vars 2>/dev/null || true
          fi

          if [ -n "$WORKER_ID" ] && ! check_service "$WORKER_ID"; then
            echo "Worker service not found in Railway — removing from state"
            terraform state rm railway_service.crm_worker 2>/dev/null || true
            terraform state rm railway_variable_collection.crm_worker_vars 2>/dev/null || true
          fi

          echo "Removing service domain from state — Terraform will recreate if missing"
          terraform state rm railway_service_domain.crm_api 2>/dev/null || true

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Get service IDs from Terraform output
        id: tf-output
        working-directory: terraform
        run: |
          echo "api_service_id=$(terraform output -raw api_service_id)" >> $GITHUB_OUTPUT
          echo "worker_service_id=$(terraform output -raw worker_service_id)" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────────
  # Job 1: Build Docker image once, push to GHCR
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/twenty-docker/twenty/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REACT_APP_SERVER_BASE_URL=${{ vars.SERVICE_URL }}

  # ──────────────────────────────────────────────
  # Job 2: Deploy API and Worker in parallel
  # Uses service IDs from Terraform output — never stale
  # ──────────────────────────────────────────────
  deploy-api:
    name: Deploy API Service
    runs-on: ubuntu-latest
    needs: [ensure-infrastructure, build-and-push]
    steps:
      - name: Trigger API redeploy via Railway API
        run: |
          BODY=$(curl -s \
            --request POST \
            --header "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data '{"query":"mutation { serviceInstanceRedeploy(environmentId: \"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\", serviceId: \"${{ needs.ensure-infrastructure.outputs.api_service_id }}\") }"}' \
            https://backboard.railway.app/graphql/v2)
          echo "Response: $BODY"
          echo "$BODY" | grep -q '"errors"' && echo "Railway API returned errors" && exit 1 || true

  deploy-worker:
    name: Deploy Worker Service
    runs-on: ubuntu-latest
    needs: [ensure-infrastructure, build-and-push]
    steps:
      - name: Trigger Worker redeploy via Railway API
        run: |
          BODY=$(curl -s \
            --request POST \
            --header "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data '{"query":"mutation { serviceInstanceRedeploy(environmentId: \"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\", serviceId: \"${{ needs.ensure-infrastructure.outputs.worker_service_id }}\") }"}' \
            https://backboard.railway.app/graphql/v2)
          echo "Response: $BODY"
          echo "$BODY" | grep -q '"errors"' && echo "Railway API returned errors" && exit 1 || true

  # ──────────────────────────────────────────────
  # Job 3: Verify deployment health
  # ──────────────────────────────────────────────
  verify:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-worker]
    steps:
      - name: Wait for deployment and verify health
        run: |
          echo "Waiting for Railway deployment to be ready..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ vars.SERVICE_URL }}/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS) after $((i * 10)) seconds"
              exit 0
            fi
            echo "Attempt $i/30: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 minutes"
          exit 1
