name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/yarn-install

      - name: Get last successful commit
        uses: nrwl/nx-set-shas@v4

      - name: Lint affected projects
        run: npx nx affected --nxBail -t lint --parallel=3

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/yarn-install

      - name: Get last successful commit
        uses: nrwl/nx-set-shas@v4

      - name: Typecheck affected projects
        run: npx nx affected --nxBail -t typecheck --parallel=3

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/yarn-install

      - name: Get last successful commit
        uses: nrwl/nx-set-shas@v4

      - name: Build affected projects
        run: npx nx affected --nxBail -t build --parallel=3

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/twenty-docker/twenty/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
